services:
  - type: web
    name: lastword-listener
    runtime: node
    rootDir: lastword-listener
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: RPC_URL
        value: https://api.devnet.solana.com
      - key: PROGRAM_ID
        value: D4Frg928RDwrsxYHZnjcwHhMVz8VaKy2zo4raMc1cLL6
      - key: ARWEAVE_GATEWAY
        value: https://arweave.net
      - key: HELIUS_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: WALLET_SECRET
        sync: false
      - key: HELIUS_WEBHOOK_ID
        sync: false
